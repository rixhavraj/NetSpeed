server:
  port: ${PORT:8080}

spring:
  application:
    name: backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  version: ${APP_VERSION:1.0.6}
  download-url: ${APP_DOWNLOAD_URL:/api/downloads/net-speed-v1.0.6.exe}
  file-name: ${APP_FILE_NAME:net-speed-v1.0.6.exe}
  file-size: ${APP_FILE_SIZE:2.2MB}
  changelog: ${APP_CHANGELOG:Upgraded to single active interface monitoring via GetBestInterface with high-precision high_resolution_clock timing and strict mathematically exact base-1024 formatting}
  download-dir: ${APP_DOWNLOAD_DIR:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://rixhavraj.github.io}
